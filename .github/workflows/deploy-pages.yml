name: Deploy GitHub Pages

on:
  push:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  generate-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Generate Ollie SVG illustrations
        if: hashFiles('ollie/illustrations.py') != ''
        run: uv run python -m ollie.illustrations

      - name: Generate Manual SVG illustrations
        if: hashFiles('manual/illustrations.py') != ''
        run: uv run python -m manual.illustrations

      - name: Prepare site
        run: |
          mkdir -p _site
          cp docs/*.html _site/
          if [ -d ollie/assets ]; then
            mkdir -p _site/ollie-assets
            cp -r ollie/assets/* _site/ollie-assets/
          fi
          if [ -d manual/assets ]; then
            mkdir -p _site/manual-assets
            cp -r manual/assets/* _site/manual-assets/
          fi

      - name: Fix asset paths in HTML
        run: |
          sed -i 's|\.\./ollie/assets/|ollie-assets/|g' _site/*.html
          sed -i 's|\.\./manual/assets/|manual-assets/|g' _site/*.html

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
