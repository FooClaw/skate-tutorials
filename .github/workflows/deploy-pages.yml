name: Build & Deploy

on:
  push:

permissions:
  contents: read
  pages: write
  id-token: write
  deployments: write
  statuses: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Generate Ollie SVG illustrations
        if: hashFiles('ollie/illustrations.py') != ''
        run: uv run python -m ollie.illustrations

      - name: Generate Manual SVG illustrations
        if: hashFiles('manual/illustrations.py') != ''
        run: uv run python -m manual.illustrations

      - name: Generate Pop Shuvit SVG illustrations
        if: hashFiles('pop_shuvit/illustrations.py') != ''
        run: uv run python -m pop_shuvit.illustrations

      - name: Prepare site
        run: |
          mkdir -p _site
          cp docs/*.html _site/
          if [ -d ollie/assets ]; then
            mkdir -p _site/ollie-assets
            cp -r ollie/assets/* _site/ollie-assets/
          fi
          if [ -d manual/assets ]; then
            mkdir -p _site/manual-assets
            cp -r manual/assets/* _site/manual-assets/
          fi
          if [ -d pop_shuvit/assets ]; then
            mkdir -p _site/pop_shuvit-assets
            cp -r pop_shuvit/assets/* _site/pop_shuvit-assets/
          fi

      - name: Fix asset paths in HTML
        run: |
          sed -i 's|\.\./ollie/assets/|ollie-assets/|g' _site/*.html
          sed -i 's|\.\./manual/assets/|manual-assets/|g' _site/*.html
          sed -i 's|\.\./pop_shuvit/assets/|pop_shuvit-assets/|g' _site/*.html

      - name: Upload site artifact
        uses: actions/upload-artifact@v4
        with:
          name: site-preview
          path: _site

  deploy-netlify:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download site artifact
        uses: actions/download-artifact@v4
        with:
          name: site-preview
          path: _site

      - name: Deploy to Netlify
        uses: nwtgck/actions-netlify@v3
        with:
          publish-dir: _site
          production-deploy: ${{ github.ref == 'refs/heads/main' }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          deploy-message: "Deploy from ${{ github.ref_name }} @ ${{ github.sha }}"
          enable-commit-comment: false
          enable-commit-status: false
          enable-github-deployment: false
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}

  deploy-pages:
    needs: build
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Download site artifact
        uses: actions/download-artifact@v4
        with:
          name: site-preview
          path: _site

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
